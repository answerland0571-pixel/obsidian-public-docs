site_name: 我的私人知识库
site_url: https://answerland0571-pixel.github.io/obsidian-public-docs/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
    - scheme: slate
      toggle:
        icon: material/brightness-4

plugins:
  - search
  - auth:
      provider: htpasswd
      auth_file: .htpasswd
      realm: "Answerland0571"

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
