site_name: 我的私人知识库
site_url: https://answerland0571-pixel.github.io/obsidian-public-docs/
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search
  - mkdocs-material-extended:
      auth:
        enabled: true
        users:
          admin: $2y$10$dummy$E9Ux0UoPqDkC8X7g8X8h01

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
